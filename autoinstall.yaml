#cloud-config
# ТЕХНИЧЕСКОЕ ОПРЕДЕЛЕНИЕ: Provisioning / Infrastructure as Code (IaC)
# Цель: Подготовка ОС, системных зависимостей и глобальных настроек окружения.

autoinstall:
  version: 1
  interactive-sections:
    - identity
  locale: ru_RU.UTF-8
  keyboard:
    layout: ru
  identity:
    hostname: mdm
    username: ss
    realname: ss
    password: "$6$exDY1SdbMBRssotn$7pS7979S79S79S79S79S79S79S79S79S79S79S79S79S79S79S79S79S79S79S79S79S79"
  
  # Автоматическое расширение LVM на весь физический диск (решение проблемы 12Гб)
  storage:
    layout:
      name: lvm
      sizing-policy: all

  ssh:
    install-server: true
    allow-pw: true

  packages:
    # Системный стек (Runtime & Build Tools)
    - docker.io
    - docker-compose
    - git
    - curl
    - build-essential
    - pkg-config
    - python3-pip
    - python3-venv
    - python3-dev
    - libssl-dev
    - libffi-dev
    - libmysqlclient-dev
    - mysql-server
    - default-mysql-client

  snaps:
    - name: code
      classic: true
    - name: brave

  late-commands:
    # Настройка графического сервера и прав доступа
    - curtin in-target -- sed -i 's/#WaylandEnable=false/WaylandEnable=false/' /etc/gdm3/custom.conf
    - curtin in-target -- usermod -aG docker ss

    # Оптимизация памяти (Swap 4GB)
    - curtin in-target -- swapoff -a
    - curtin in-target -- fallocate -l 4G /swapfile
    - curtin in-target -- chmod 600 /swapfile
    - curtin in-target -- mkswap /swapfile
    - curtin in-target -- swapon /swapfile
    - curtin in-target -- sh -c "echo '/swapfile none swap sw 0 0' >> /etc/fstab"
    - curtin in-target -- sh -c "echo 'vm.swappiness=10' >> /etc/sysctl.conf"

    # Очистка системы от предустановленного браузера
    - curtin in-target -- snap remove firefox
    - curtin in-target -- apt-get purge -y firefox
