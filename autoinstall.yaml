#cloud-config
autoinstall:
  version: 1
  interactive-sections:
    - identity
  locale: ru_RU.UTF-8
  keyboard:
    layout: ru
  identity:
    hostname: mdm
    username: ss
    realname: ss
  ssh:
    install-server: true
    allow-pw: true
  
  # Установка стандартных APT-пакетов
  packages:
    - docker.io
    - docker-compose
    - git
    - python3-pip
    - python3-venv
    - curl
    - build-essential # Важно для компиляции некоторых Python-библиотек

  # Установка VS Code через Snap
  snaps:
    - name: code
      classic: true

  late-commands:
    # 1. Отключаем Wayland (исправляет черные окна в VirtualBox)
    - curtin in-target -- sed -i 's/#WaylandEnable=false/WaylandEnable=false/' /etc/gdm3/custom.conf
    # 2. Добавляем пользователя в группу docker
    - curtin in-target -- usermod -aG docker ss
    # 3. Настройка рабочей директории
    - curtin in-target -- mkdir -p /home/ss/projects
    - curtin in-target -- chown -R ss:ss /home/ss/projects
    # 4. (Опционально) Предустановка расширений VS Code для Python и Docker
    - curtin in-target -- sudo -u ss code --install-extension ms-python.python
    - curtin in-target -- sudo -u ss code --install-extension ms-azuretools.vscode-docker

  user-data:
    package_upgrade: true
